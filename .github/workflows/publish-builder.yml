name: Publish Builder Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile.builder'
      - 'scripts/build-server.sh'
      - 'cmd/**'
      - 'internal/**'
      - 'runtime/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile.builder'
      - 'scripts/build-server.sh'
      - 'cmd/**'
      - 'internal/**'
      - 'runtime/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0). Leave empty for latest'
        required: false
        type: string

env:
  BUILDER_IMAGE_NAME: gcossani/ssfbff-builder
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BUILDER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build and push builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Output image info
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Built and pushed builder image:"
          echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | while read tag; do
            echo "  - ${{ env.BUILDER_IMAGE_NAME }}:$tag"
          done

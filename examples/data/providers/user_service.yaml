# Legacy style: base_url. Alternatively use host + path (see api_service.yaml).
base_url: http://user-svc:8080
timeout: 5s
# Optional: headers, query, connection_timeout, redirections_max (see README).
endpoints:
  # Simple string format (backward compatible)
  profile: /api/profile
  
  # Object format with caching enabled (useful when profile is called multiple times)
  profile_cached:
    path: /api/profile
    use_cache: true
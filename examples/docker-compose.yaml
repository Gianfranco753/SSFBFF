# Full-stack demo: BFF + mock upstream services.
#
# Run from the project root:
#   docker compose -f examples/docker-compose.yaml up --build
#
# Then:
#   curl http://localhost:3000/health
#   curl http://localhost:3000/dashboard
#   curl http://localhost:3000/api/v1/orders
#   curl http://localhost:3000/api/v1/products

services:
  mockserver:
    build:
      context: ./mockserver
    ports:
      - "9999:9999"

  bff:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mockserver
    environment:
      PORT: "3000"
      UPSTREAM_USER_SERVICE_URL: http://mockserver:9999
      UPSTREAM_BANK_SERVICE_URL: http://mockserver:9999
      UPSTREAM_ORDERS_URL: http://mockserver:9999/data
      UPSTREAM_PRODUCTS_URL: http://mockserver:9999/data/products

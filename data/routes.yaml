# Route definitions — each entry maps an HTTP path to a JSONata service.
#
# The jsonata file name refers to a file in data/services/.
# Routes using $fetch() or $service() are automatically wired to the aggregator.
# Routes without $fetch() use a single upstream via UPSTREAM_<NAME>_URL env var.

routes:
  - path: /dashboard
    method: GET
    jsonata: dashboard.jsonata

  - path: /api/v1/orders
    method: GET
    jsonata: orders.jsonata

  - path: /api/v1/products
    method: GET
    jsonata: products.jsonata
